<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>WinGo Admin</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0}.header{background:#1e293b;padding:15px;text-align:center;border-bottom:2px solid #334155}.header h2{color:#38bdf8}.container{max-width:1300px;margin:15px auto;padding:15px}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:15px}.stat-card{background:#1e293b;padding:15px;border-radius:8px;text-align:center;border:1px solid #334155}.stat-card h3{color:#38bdf8;font-size:1.5rem}.tabs{display:flex;gap:5px;margin-bottom:15px}.tabs button{padding:10px 15px;background:#1e293b;border:1px solid #334155;color:white;cursor:pointer;border-radius:6px;font-size:13px}.tabs button.active{background:#38bdf8;color:#000}table{width:100%;background:#1e293b;border-radius:8px;overflow:hidden}th{background:#0f172a;padding:10px;text-align:left;color:#94a3b8;font-size:11px}td{padding:10px;border-bottom:1px solid #334155;font-size:12px}.btn{padding:5px 10px;border:none;border-radius:4px;cursor:pointer;margin:1px;font-size:11px;color:white}.bg{background:#065f46}.br{background:#7f1d1d}.bb{background:#1e40af}.badge{padding:2px 6px;border-radius:8px;font-size:10px}.premium{background:#1e40af;color:#93c5fd}.trial{background:#854d0e;color:#fbbf24}.expired{background:#7f1d1d;color:#fca5a5}.none{background:#334155;color:#94a3b8}input,select{width:100%;padding:8px;margin:4px 0;background:#0f172a;border:1px solid #334155;color:white;border-radius:4px}.card{background:#1e293b;padding:15px;border-radius:8px;margin-top:10px}.msg{padding:8px;margin:3px 0;border-radius:6px;font-size:12px}.flex{display:flex;gap:10px}.tx{font-family:monospace;font-size:10px;word-break:break-all;max-width:120px;display:inline-block}</style></head><body>
<div class="header"><h2>WinGo Admin Panel</h2></div>
<div class="container">
<div class="stats"><div class="stat-card"><h3 id="tu">-</h3><p>Users</p></div><div class="stat-card"><h3 id="pu">-</h3><p>Premium</p></div><div class="stat-card"><h3 id="tr">-</h3><p>Trial</p></div><div class="stat-card"><h3 id="pp">-</h3><p>Payments</p></div><div class="stat-card"><h3 id="pw">-</h3><p>Withdraws</p></div><div class="stat-card"><h3 id="wr">-</h3><p>Win Rate</p></div></div>
<div class="tabs"><button class="active" onclick="showTab('users')">Users</button><button onclick="showTab('payments')">Payments</button><button onclick="showTab('withdrawals')">Withdrawals</button><button onclick="showTab('premium')">Premium</button><button onclick="showTab('support')">Support</button><button onclick="showTab('settings')">Settings</button></div>
<div id="content"><p>Loading...</p></div></div>
<script>
const A='https://colour-trading-prediction-ai-production.up.railway.app/api';
function S(v){return v?String(v):''}
function ID(v){let s=S(v);return s.length>8?s.slice(-8):s}
async function F(u,o={}){try{let r=await fetch(u,o);return await r.json()}catch(e){return null}}
async function dash(){let d=await F(A+'/stats');if(!d)return;document.getElementById('tu').textContent=d.totalUsers||0;document.getElementById('pu').textContent=d.premiumUsers||0;document.getElementById('tr').textContent=d.trialUsers||0;document.getElementById('pp').textContent=d.pendingPayments||0;document.getElementById('pw').textContent=d.pendingWithdraws||0;document.getElementById('wr').textContent=(d.totalPredictions>0?((d.totalWins/d.totalPredictions)*100).toFixed(1):'0')+'%'}
async function loadUsers(){let u=await F(A+'/users');if(!u||!u.length){document.getElementById('content').innerHTML='<div class="card"><p>No users</p></div>';return}let h='<table><tr><th>ID</th><th>Name</th><th>Plan</th><th>Pred</th><th>Wins</th><th>Rate</th><th>Balance</th><th>Referral</th><th>Actions</th></tr>';u.forEach(x=>{let r=x.predictions>0?((x.wins/x.predictions)*100).toFixed(1):'0';h+='<tr><td>'+ID(x.id)+'</td><td>'+S(x.name)+'</td><td><span class="badge '+S(x.plan)+'">'+S(x.plan)+'</span></td><td>'+x.predictions+'</td><td>'+x.wins+'</td><td>'+r+'%</td><td>₹'+(x.balance||0)+'</td><td>'+S(x.referralCode)+'</td><td><button class="btn bb" onclick="rt(\''+S(x.id)+'\')">Trial</button><button class="btn bg" onclick="ap(\''+S(x.id)+'\')">Premium</button><button class="btn br" onclick="rp(\''+S(x.id)+'\')">Remove</button><button class="btn br" onclick="du(\''+S(x.id)+'\')">Del</button></td></tr>'});h+='</table>';document.getElementById('content').innerHTML=h}
async function rt(id){await F(A+'/users/restart-trial',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:id})});loadUsers();dash()}
async function ap(id){let d=prompt('Days?','30');if(!d)return;await F(A+'/users/add-premium',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:id,duration:parseInt(d)})});loadUsers();dash()}
async function rp(id){await F(A+'/users/remove-premium',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:id})});loadUsers();dash()}
async function du(id){if(!confirm('Delete?'))return;await F(A+'/users/'+id,{method:'DELETE'});loadUsers();dash()}
async function loadPayments(){let p=await F(A+'/payments');if(!p||!p.length){document.getElementById('content').innerHTML='<div class="card"><p>No payments</p></div>';return}let h='<table><tr><th>#</th><th>User</th><th>Type</th><th>Transaction ID</th><th>Date</th><th>Status</th><th>Actions</th></tr>';p.forEach((x,i)=>{h+='<tr><td>'+i+'</td><td>'+ID(x.userId)+'</td><td>'+S(x.type)+'</td><td class="tx">'+S(x.txHash||'N/A')+'</td><td>'+(x.timestamp?new Date(x.timestamp).toLocaleString():'N/A')+'</td><td><b>'+S(x.status)+'</b></td><td>'+(x.status==='pending'?'<button class="btn bg" onclick="appr('+i+')">Approve</button><button class="btn br" onclick="rej('+i+')">Reject</button>':S(x.status))+'</td></tr>'});h+='</table>';document.getElementById('content').innerHTML=h}
async function appr(i){await F(A+'/payments/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({index:i})});loadPayments();dash()}
async function rej(i){await F(A+'/payments/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({index:i})});loadPayments();dash()}
async function loadWithdrawals(){let w=await F(A+'/withdrawals');if(!w||!w.length){document.getElementById('content').innerHTML='<div class="card"><p>No withdrawals</p></div>';return}let h='<table><tr><th>#</th><th>User</th><th>Amount</th><th>Method</th><th>Address</th><th>Date</th><th>Status</th><th>Actions</th></tr>';w.forEach((x,i)=>{h+='<tr><td>'+i+'</td><td>'+ID(x.userId)+'</td><td>₹'+x.amount+'</td><td>'+S(x.method)+'</td><td class="tx">'+S(x.address)+'</td><td>'+(x.time?new Date(x.time).toLocaleString():'N/A')+'</td><td><b>'+S(x.status)+'</b></td><td>'+(x.status==='pending'?'<button class="btn bg" onclick="appw('+i+')">Pay</button>':S(x.status))+'</td></tr>'});h+='</table>';document.getElementById('content').innerHTML=h}
async function appw(i){await F(A+'/withdrawals/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({index:i})});loadWithdrawals();dash()}
async function loadPremium(){let u=await F(A+'/users');if(!u)return;let p=u.filter(x=>S(x.plan)==='premium');if(!p.length){document.getElementById('content').innerHTML='<div class="card"><p>No premium users</p></div>';return}let h='<table><tr><th>ID</th><th>Name</th><th>Balance</th><th>Referral</th><th>Actions</th></tr>';p.forEach(x=>{h+='<tr><td>'+ID(x.id)+'</td><td>'+S(x.name)+'</td><td>₹'+(x.balance||0)+'</td><td>'+S(x.referralCode)+'</td><td><button class="btn br" onclick="rp(\''+S(x.id)+'\')">Remove</button></td></tr>'});h+='</table>';document.getElementById('content').innerHTML=h}
async function loadSupport(){let u=await F(A+'/support/users');let h='<div class="flex"><div class="card" style="width:200px"><h4>Chats</h4>';if(u&&u.length){u.forEach(x=>{h+='<div style="padding:6px;cursor:pointer;background:#334155;margin:3px 0;border-radius:4px" onclick="lc(\''+x+'\')">'+ID(x)+'</div>'})}else{h+='<p>No chats</p>'}h+='</div><div class="card" style="flex:1" id="chatArea"><p>Select user</p></div></div>';document.getElementById('content').innerHTML=h}
async function lc(id){let c=await F(A+'/support/'+id);let h='<h4>Chat: '+ID(id)+'</h4><div style="max-height:250px;overflow-y:auto;margin:8px 0">';if(c&&c.length){c.forEach(m=>{h+='<div class="msg" style="background:'+(m.from==='admin'?'#1e40af':'#334155')+'"><b>'+m.from+':</b> '+m.text+'<br><small>'+new Date(m.time).toLocaleTimeString()+'</small></div>'})}h+='</div><div class="flex"><input id="rm" placeholder="Reply..." style="flex:1"><button class="btn bg" onclick="sr(\''+id+'\')">Send</button></div>';document.getElementById('chatArea').innerHTML=h}
async function sr(id){let m=document.getElementById('rm').value;if(!m)return;await F(A+'/support',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:id,message:m})});document.getElementById('rm').value='';lc(id)}
async function loadSettings(){let s=await F(A+'/settings');document.getElementById('content').innerHTML='<div class="card" style="max-width:500px"><h4>Settings</h4><label>Indian Payment Link:</label><input id="il" value="'+(s?.indianPaymentLink||'')+'"><label>BTC Address:</label><input id="ba" value="'+(s?.btcAddress||'')+'"><label>USDT Address:</label><input id="ua" value="'+(s?.usdtAddress||'')+'"><label>Premium Price (₹):</label><input id="pr" type="number" value="'+(s?.premiumPrice||2499)+'"><label>Referral Commission (₹):</label><input id="rc" type="number" value="'+(s?.referralCommission||500)+'"><label>Min Withdraw (₹):</label><input id="mw" type="number" value="'+(s?.minWithdraw||2500)+'"><br><button class="btn bg" onclick="ss()">Save</button></div>'}
async function ss(){await F(A+'/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({indianPaymentLink:document.getElementById('il').value,btcAddress:document.getElementById('ba').value,usdtAddress:document.getElementById('ua').value,premiumPrice:parseInt(document.getElementById('pr').value)||2499,referralCommission:parseInt(document.getElementById('rc').value)||500,minWithdraw:parseInt(document.getElementById('mw').value)||2500})});alert('Saved!')}
function showTab(t){document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');if(t==='users')loadUsers();if(t==='payments')loadPayments();if(t==='withdrawals')loadWithdrawals();if(t==='premium')loadPremium();if(t==='support')loadSupport();if(t==='settings')loadSettings()}
dash();loadUsers();
</script></body></html>
